services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    volumes:
      - ./src:/var/www
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:latest
    container_name: laravel_nginx
    ports:
      - "8088:80"
    volumes:
      - ./src:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_worker
    volumes:
      - ./src:/var/www
      - ./supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
    depends_on:
      - db
      - redis
    command: supervisord -n -c /etc/supervisor/conf.d/supervisord.conf

  db:
    image: mysql:8
    container_name: laravel_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE-scheduler}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD-root}
      MYSQL_USER: ${DB_USERNAME-scheduler}
      MYSQL_PASSWORD: ${DB_PASSWORD-12345678}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: laravel_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
